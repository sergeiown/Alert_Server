<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="380" fill="#ffffff"/>

  <rect x="30" y="40" width="220" height="110" rx="10" fill="#eef4ff" stroke="#5b8def" stroke-width="2"/>
  <text x="140" y="80" text-anchor="middle" font-size="17" font-weight="600" fill="#1f3a63">Electron-застосунок</text>
  <text x="140" y="103" text-anchor="middle" font-size="12" fill="#3c5a86">Іконка трею + вікно налаштувань</text>
  <text x="140" y="122" text-anchor="middle" font-size="12" fill="#3c5a86">опитує кожні 30с</text>

  <rect x="350" y="40" width="220" height="110" rx="10" fill="#fff6e6" stroke="#e0a020" stroke-width="2"/>
  <text x="460" y="80" text-anchor="middle" font-size="17" font-weight="600" fill="#6b4a00">Cloudflare Worker</text>
  <text x="460" y="103" text-anchor="middle" font-size="12" fill="#7a5b12">alert-proxy</text>
  <text x="460" y="122" text-anchor="middle" font-size="12" fill="#7a5b12">кеш на межі мережі, TTL ~30с</text>

  <rect x="670" y="40" width="220" height="110" rx="10" fill="#eefaf0" stroke="#3fae5a" stroke-width="2"/>
  <text x="780" y="80" text-anchor="middle" font-size="17" font-weight="600" fill="#1e5c31">alerts.in.ua</text>
  <text x="780" y="103" text-anchor="middle" font-size="12" fill="#2c7042">публічне API тривог</text>
  <text x="780" y="122" text-anchor="middle" font-size="12" fill="#2c7042">Bearer-токен</text>

  <line x1="250" y1="95" x2="345" y2="95" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="297" y="85" text-anchor="middle" font-size="11" fill="#555">X-Client-Key</text>

  <line x1="570" y1="95" x2="665" y2="95" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="617" y="85" text-anchor="middle" font-size="11" fill="#555">HTTPS</text>

  <rect x="30" y="230" width="220" height="100" rx="10" fill="#f5eefc" stroke="#9b5fd6" stroke-width="2"/>
  <text x="140" y="270" text-anchor="middle" font-size="15" font-weight="600" fill="#4a2a70">Центр сповіщень</text>
  <text x="140" y="292" text-anchor="middle" font-size="12" fill="#5e3a86">Windows</text>
  <text x="140" y="311" text-anchor="middle" font-size="12" fill="#5e3a86">тост + звук</text>

  <line x1="140" y1="150" x2="140" y2="225" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="215" y="192" text-anchor="middle" font-size="11" fill="#555">нова / скасована тривога</text>

  <rect x="350" y="230" width="220" height="100" rx="10" fill="#eef4ff" stroke="#5b8def" stroke-width="2"/>
  <text x="460" y="270" text-anchor="middle" font-size="15" font-weight="600" fill="#1f3a63">Вікно налаштувань</text>
  <text x="460" y="292" text-anchor="middle" font-size="12" fill="#3c5a86">вибір регіонів, мова,</text>
  <text x="460" y="311" text-anchor="middle" font-size="12" fill="#3c5a86">звук, автозапуск</text>

  <line x1="140" y1="150" x2="440" y2="225" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
